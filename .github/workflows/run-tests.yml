name: run-tests

on:
  push:
    branches: [master, develop]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '9.*'
            testbench: '^7.0'
          - php: '8.1'
            laravel: '10.*'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '9.*'
            testbench: '^7.0'
          - php: '8.2'
            laravel: '10.*'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.2'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '10.*'
            testbench: '^8.0'
          - php: '8.3'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.0'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/contracts=${{ matrix.laravel }}" "orchestra/testbench=${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test
